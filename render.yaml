services:
  - type: web
    name: crm-hcp-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-hcp-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ai-first-crm-hcp.netlify.app,https://ai-first-crm-hcp-modul.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: crm-hcp-db
    plan: free
    databaseName: crm_hcp
